name: Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy application via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REACT_APP_API_URL
          script: |
            # Navigate to the project directory
            cd ~/sampleapp_IFQ636

            # Force sync with GitHub (clears any local conflicts)
            git fetch --all
            git reset --hard origin/main

            # Backend setup
            cd backend
            npm install

            # Frontend setup and memory-boosted build
            cd ../frontend
            npm install

            # Inject the production API URL from GitHub Secrets
            echo "REACT_APP_API_URL=$REACT_APP_API_URL" > .env

            # Increase Node memory limit to 2GB to prevent "Heap out of memory" crash
            export NODE_OPTIONS="--max-old-space-size=2048"
            npm run build

            # Restart all processes via PM2
            pm2 restart all
            pm2 save

            # Reset terminal location
            cd ~
